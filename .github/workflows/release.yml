name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to release (v1.0.0+1.21.11)"
                required: true

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Resolve tag
              id: tag
              run: |
                  TAG="${{ github.event.inputs.tag || github.ref_name }}"
                  WITHOUT_V="${TAG#v}"
                  MOD_VERSION="${WITHOUT_V%%+*}"
                  MC_VERSION="${WITHOUT_V##*+}"
                  echo "tag=$TAG"                 >> $GITHUB_OUTPUT
                  echo "mod_version=$MOD_VERSION" >> $GITHUB_OUTPUT
                  echo "mc_version=$MC_VERSION"   >> $GITHUB_OUTPUT

            - uses: actions/checkout@v4
              with:
                  ref: ${{ steps.tag.outputs.tag }}

            - name: Extract changelog
              id: changelog
              run: |
                  VERSION="${{ steps.tag.outputs.mod_version }}"
                  NOTES=$(awk -v ver="$VERSION" '
                    /^## \[/ { if (flag) exit; if (index($0, "## [" ver "]") == 1) flag=1; next }
                    flag { print }
                  ' CHANGELOG.md)
                  echo "notes<<EOF" >> $GITHUB_OUTPUT
                  printf '%s\n' "$NOTES" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Build
              run: ./gradlew build --no-daemon

            - name: Publish to Modrinth
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
                  RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
              run: ./gradlew modrinth --no-daemon

            - name: Set Modrinth project environment
              env:
                  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                  MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
              run: |
                  curl -s -X PATCH "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
                    -H "Authorization: ${MODRINTH_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d '{"server_side":"required","client_side":"required"}'

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.tag }}
                  name: "v${{ steps.tag.outputs.mod_version }} for MC ${{ steps.tag.outputs.mc_version }}"
                  body: ${{ steps.changelog.outputs.notes }}
                  files: |
                      build/libs/*.jar
                      !build/libs/*-dev.jar
